{% extends "base.html" %}
{% block title %}Form{% endblock %}

{% block content %}
<h1>Form para o banco</h1>



    <ul>
    {% for alunos in alunos %}
        <li>{{alunos}} <button onclick="deleteAluno({{  alunos.pid  }})">Apagar</button><a href="{{url_for('details', pid=alunos.pid) }}">Details</a></li>
    {% endfor %}
    </ul>

    <h3>Novo Aluno</h3>
    <form action="{{ url_for('database' ) }}" method="POST">
        <input type="text" name="name" placeholder="name" required="required"><br>
        <input type="number" name="age" placeholder="age"><br>
        <input type="text" name="job" placeholder="job"><br>
        <input type="submit" value="Create">
    </form>

    <script type="text/javascript">
        function deleteAluno(pid) {
            fetch('{{ url_for("delete", pid=pid) }}' + pid, {
                method: 'DELETE'
            }).then(response => {
                if(response.ok){
                    window.location.reload();
                } else{
                    console.error('Erro em deletar item com id: ', pid);
                }
            })
                .catch(error => {
                    console.error('Erro durante fetch: ', error);
                });
        }

    </script>
    

{% endblock %}
